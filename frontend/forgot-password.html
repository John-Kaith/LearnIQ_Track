<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - LearnIQ Track</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-dark text-light min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <section class="glass-card content-card auth-card">
      <header class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-graduation-cap"></i>
          <span>LearnIQ Track</span>
        </div>
        <span class="status-badge online">Password Recovery</span>
      </header>

      <div class="auth-content">
        <h2>Reset Password</h2>
        <p class="content-subtitle">Enter your registered email address. We'll send you instructions to reset your password.</p>
      </div>

      <form id="forgot-password-form" class="auth-form">
        <label>
          <span>Email Address</span>
          <input id="forgot-email" type="email" placeholder="name@school.edu" required />
        </label>

        <button class="btn btn-primary btn-block" type="submit">Send Reset Instructions</button>
      </form>

      <p id="forgot-message" class="auth-card-note" style="display:none;"></p>
      <p class="auth-link">Remember your password? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setupForgotPasswordPage();
    });
  </script>
</body>
</html>
